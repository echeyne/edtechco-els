AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: |
  ELS Parent Planning Tool Infrastructure
  - Frontend: S3 + CloudFront (plan.<domain>.com)
  - Planning API: Lambda + API Gateway (Hono)
  - Bedrock Guardrails for content filtering

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  PipelineStackName:
    Type: String
    Default: els-pipeline-dev
    Description: Name of the pipeline CloudFormation stack (for cross-stack VPC/DB references)
  CustomDomainName:
    Type: String
    Default: ""
    Description: Custom domain name for the planning site (e.g. plan.example.com). Leave empty to use CloudFront URL.
  HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 Hosted Zone ID for the custom domain. Required when CustomDomainName is set.
  DescopeProjectId:
    Type: String
    Description: Descope project ID for authentication
    NoEcho: true
  BedrockAgentModelId:
    Type: String
    Default: anthropic.claude-sonnet-4-6
    Description: Bedrock foundation model ID for the planning agent
  AgentCoreRuntimeArn:
    Type: String
    Default: ""
    Description: AgentCore Runtime ARN (set after CLI deployment, e.g. arn:aws:bedrock-agentcore:REGION:ACCOUNT:runtime/RUNTIME_ID)

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, ""]]
  HasAgentCoreRuntimeArn: !Not [!Equals [!Ref AgentCoreRuntimeArn, ""]]

Resources:
  # ─── Frontend: S3 bucket for static assets ───
  PlanningFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "els-planning-frontend-${EnvironmentName}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PlanningFrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${PlanningFrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PlanningCloudFrontDistribution}"

  # ─── CloudFront Distribution ───
  PlanningCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "els-planning-oac-${EnvironmentName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PlanningCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "ELS Planning Tool - ${EnvironmentName}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        Aliases: !If
          - HasCustomDomain
          - [!Ref CustomDomainName]
          - !Ref "AWS::NoValue"
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref PlanningDomainCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref "AWS::NoValue"
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PlanningFrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref PlanningCloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiOrigin
            DomainName: !Sub "${PlanningApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: "/api/*"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  # ─── Planning API: Lambda Function ───
  PlanningApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "els-planning-api-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentCorePresignedUrl
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeRuntime
                  - bedrock-agentcore:InvokeAgentRuntimeWithWebSocketStream
                Resource:
                  - !If
                    - HasAgentCoreRuntimeArn
                    - !Ref AgentCoreRuntimeArn
                    - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
        - PolicyName: RdsDataReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningApiLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "els-planning-api-${EnvironmentName}"
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt PlanningApiLambdaRole.Arn
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          DB_CLUSTER_ARN: !ImportValue
            Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
          DB_SECRET_ARN: !ImportValue
            Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
          DB_NAME: els_pipeline
          DESCOPE_PROJECT_ID: !Ref DescopeProjectId
          AGENTCORE_RUNTIME_ARN: !Ref AgentCoreRuntimeArn
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: 'placeholder' });
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  # ─── Planning API: API Gateway (HTTP API) ───
  PlanningApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "els-planning-api-${EnvironmentName}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "http://localhost:5173"
          - "http://localhost:4173"
          - !If
            - HasCustomDomain
            - !Sub "https://${CustomDomainName}"
            - !Ref "AWS::NoValue"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  PlanningApiGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt PlanningApiLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  PlanningApiGatewayRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningApiGateway
      RouteKey: "$default"
      Target: !Sub "integrations/${PlanningApiGatewayIntegration}"

  PlanningApiGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PlanningApiGateway
      StageName: "$default"
      AutoDeploy: true

  PlanningApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PlanningApiLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PlanningApiGateway}/*"

  # ─── AgentCore Runtime ───
  # The AgentCore Runtime agent is deployed via the AgentCore CLI
  # (`bedrock-agentcore deploy`) rather than CloudFormation, as there is no
  # native CloudFormation resource type for AgentCore Runtime yet.
  # The WaitConditionHandle below is a no-op placeholder so that the template
  # can reference the agent's IAM role and output the agent ID (supplied via
  # the AgentCoreAgentId parameter after CLI deployment).

  PlanningAgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "els-planning-agentcore-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockModelInvocation
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:*::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
        - PolicyName: AllowAgentCoreInvole
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntimeWithWebSocketStream
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:agent-runtime/*"
        - PolicyName: BedrockGuardrailAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ApplyGuardrail
                Resource:
                  - !GetAtt PlanningBedrockGuardrail.GuardrailArn
        - PolicyName: RdsDataApiAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/*"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningAgentCoreRuntime:
    # The AgentCore Runtime agent is deployed via the AgentCore CLI using
    # direct_code_deploy (serverless — no container to manage).
    # Run: agentcore configure --deployment-type direct_code_deploy --runtime PYTHON_3_13
    #      agentcore deploy
    # After deployment, set the AgentCoreRuntimeArn parameter to the agent ARN
    # returned by the CLI so that the Lambda and outputs reference it.
    Type: AWS::CloudFormation::WaitConditionHandle

  # ─── Bedrock Guardrails ───
  PlanningBedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "els-planning-guardrail-${EnvironmentName}"
      Description: "Guardrails for the Parent Planning Tool Bedrock Agent"
      BlockedInputMessaging: "I'm sorry, but I can only help with creating and refining learning plans for your child. Could you please ask me something related to your child's learning plan?"
      BlockedOutputsMessaging: "I'm sorry, but I'm unable to provide that type of response. I'm here to help you create and refine learning plans for your child. Let's get back to planning!"
      ContentPolicyConfig:
        FiltersConfig:
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      TopicPolicyConfig:
        TopicsConfig:
          - Name: MedicalAdvice
            Definition: "Providing medical advice, medical diagnoses, treatment recommendations, medication suggestions, or any guidance that should come from a licensed healthcare professional."
            Examples:
              - "What medication should I give my child for ADHD?"
              - "Is my child's development normal for their age?"
            Type: DENY
          - Name: DevelopmentalDiagnoses
            Definition: "Diagnosing or suggesting developmental conditions, disabilities, learning disorders, behavioral disorders, or any clinical assessment of a child's developmental status."
            Examples:
              - "Does my child have a learning disability?"
              - "My child might be on the autism spectrum, can you confirm?"
            Type: DENY
          - Name: TherapeuticRecommendations
            Definition: "Recommending specific therapies, therapeutic interventions, counseling approaches, or clinical treatment plans that should be prescribed by licensed therapists or clinicians."
            Examples:
              - "What type of therapy does my child need?"
              - "Should my child get speech therapy?"
            Type: DENY
          - Name: Politics
            Definition: "Discussing political topics, political parties, elections, government policies, political opinions, or politically divisive subjects."
            Examples:
              - "What do you think about the current education policy?"
              - "Which political party supports early childhood education?"
            Type: DENY
          - Name: Religion
            Definition: "Discussing religious beliefs, religious practices, religious education, faith-based parenting, or promoting any particular religious viewpoint."
            Examples:
              - "Should I include religious education in my child's plan?"
              - "What does the Bible say about raising children?"
            Type: DENY
          - Name: PersonalRelationships
            Definition: "Providing advice on personal relationships, marital issues, family conflicts, co-parenting disputes, custody matters, or interpersonal relationship guidance."
            Examples:
              - "My spouse and I disagree on parenting, what should I do?"
              - "How do I handle my ex's parenting style?"
            Type: DENY
          - Name: FinancialAdvice
            Definition: "Providing financial advice, investment recommendations, budgeting guidance, cost comparisons of educational programs, or any monetary planning guidance."
            Examples:
              - "How much should I save for my child's education?"
              - "Is private preschool worth the cost?"
            Type: DENY
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: EMAIL
            Action: BLOCK
          - Type: PHONE
            Action: BLOCK
          - Type: US_SOCIAL_SECURITY_NUMBER
            Action: BLOCK
          - Type: CREDIT_DEBIT_CARD_NUMBER
            Action: BLOCK
          - Type: US_BANK_ACCOUNT_NUMBER
            Action: BLOCK
          - Type: IP_ADDRESS
            Action: BLOCK
          - Type: URL
            Action: BLOCK
          - Type: DRIVER_ID
            Action: BLOCK
          - Type: US_PASSPORT_NUMBER
            Action: BLOCK
          - Type: US_INDIVIDUAL_TAX_IDENTIFICATION_NUMBER
            Action: BLOCK
        RegexesConfig:
          - Name: EmailPattern
            Description: "Matches email addresses"
            Pattern: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
            Action: BLOCK
          - Name: PhonePattern
            Description: "Matches US phone numbers"
            Pattern: "(\\+?1[-\\s.]?)?\\(?\\d{3}\\)?[-\\s.]?\\d{3}[-\\s.]?\\d{4}"
            Action: BLOCK
          - Name: SSNPattern
            Description: "Matches US Social Security Numbers"
            Pattern: "\\b\\d{3}[-\\s]?\\d{2}[-\\s]?\\d{4}\\b"
            Action: BLOCK
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: PROFANITY
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningBedrockGuardrailVersion:
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !Ref PlanningBedrockGuardrail
      Description: !Sub "Planning guardrail version - ${EnvironmentName}"

  # ─── Custom Domain (conditional) ───
  PlanningDomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref CustomDomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt PlanningCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # CloudFront global hosted zone ID
        EvaluateTargetHealth: false

Outputs:
  PlanningFrontendBucketName:
    Value: !Ref PlanningFrontendBucket
    Description: S3 bucket for planning frontend static assets

  PlanningCloudFrontDomainName:
    Value: !GetAtt PlanningCloudFrontDistribution.DomainName
    Description: CloudFront distribution URL for the planning site

  PlanningCloudFrontDistributionId:
    Value: !Ref PlanningCloudFrontDistribution
    Description: CloudFront distribution ID (for cache invalidation)

  PlanningApiGatewayUrl:
    Value: !Sub "https://${PlanningApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
    Description: Planning API Gateway endpoint URL

  PlanningApiLambdaFunctionName:
    Value: !Ref PlanningApiLambdaFunction
    Description: Planning API Lambda function name

  PlanningGuardrailId:
    Value: !Ref PlanningBedrockGuardrail
    Description: Bedrock Guardrail ID

  PlanningAgentCoreRuntimeArn:
    Value: !Ref AgentCoreRuntimeArn
    Description: AgentCore Runtime ARN (set via AgentCoreRuntimeArn parameter after CLI deployment)

  PlanningAgentCoreRoleArn:
    Value: !GetAtt PlanningAgentCoreRole.Arn
    Description: IAM role ARN for the AgentCore Runtime agent

  PlanningCustomDomainUrl:
    Condition: HasCustomDomain
    Value: !Sub "https://${CustomDomainName}"
    Description: Custom domain URL for the planning site
